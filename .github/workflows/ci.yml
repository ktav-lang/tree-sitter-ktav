name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: tree-sitter test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tree-sitter CLI
        # Pin to a specific minor — tree-sitter regenerates parser.c
        # and tree_sitter/*.h from grammar.js on every `generate`, and
        # the header layout shifts between minors. Pinning keeps the
        # generated artifacts reproducible across CI runs and matches
        # what's committed under src/.
        run: npm install -g tree-sitter-cli@0.26.8

      - name: Regenerate parser
        # Parser sources under src/ are committed for downstream
        # consumers (Neovim's nvim-treesitter expects them in the repo)
        # but we always re-derive them from grammar.js in CI before
        # running tests, so a `grammar.js` change that wasn't followed
        # by `tree-sitter generate` still gets exercised.
        run: tree-sitter generate

      - name: Run corpus tests
        run: tree-sitter test

  rust:
    name: cargo build / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo build
        run: cargo build --verbose
      - name: cargo test
        run: cargo test --verbose

  node:
    name: node-gyp build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node -e "require('./bindings/node')"
